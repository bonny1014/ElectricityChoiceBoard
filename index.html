<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Mission Choice Board - Grade 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .line-clamp-4 {
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 4;
        }
    </style>
</head>
<body class="m-0 p-0">
    <div id="app"></div>

    <script>
        // ===== STATE MANAGEMENT =====
        const AppState = {
            activeTask: null,
            selectedTasks: (() => {
                try {
                    const saved = localStorage.getItem('electricChallengeSelections');
                    return saved ? JSON.parse(saved) : { col1: null, col2: null, col3: null };
                } catch (error) {
                    return { col1: null, col2: null, col3: null };
                }
            })(),
            checklistState: {}
        };

        // ===== HELPER FUNCTIONS =====
        function saveSelections() {
            try {
                localStorage.setItem('electricChallengeSelections', JSON.stringify(AppState.selectedTasks));
            } catch (error) {
                console.error('Failed to save selections:', error);
            }
        }

        function loadChecklist(taskId) {
            try {
                const saved = localStorage.getItem(`mission_${taskId}_checklist`);
                AppState.checklistState = saved ? JSON.parse(saved) : {};
            } catch (error) {
                AppState.checklistState = {};
            }
        }

        function saveChecklist(taskId) {
            try {
                localStorage.setItem(`mission_${taskId}_checklist`, JSON.stringify(AppState.checklistState));
            } catch (error) {
                console.error('Failed to save checklist:', error);
            }
        }

        function toggleCheckbox(taskId, index) {
            AppState.checklistState[index] = !AppState.checklistState[index];
            saveChecklist(taskId);
            render();
        }

        function handleTaskSelect(task) {
            const colKey = `col${task.col}`;
            AppState.selectedTasks[colKey] = AppState.selectedTasks[colKey] === task.id ? null : task.id;
            saveSelections();
            render();
        }

        function isSelected(task) {
            return AppState.selectedTasks[`col${task.col}`] === task.id;
        }

        function getCompletionCount() {
            return Object.values(AppState.selectedTasks).filter(v => v !== null).length;
        }

        function handleReset() {
            if (confirm('Are you sure you want to clear all your choices? This cannot be undone!')) {
                AppState.selectedTasks = { col1: null, col2: null, col3: null };
                localStorage.removeItem('electricChallengeSelections');
                render();
            }
        }

        function setActiveTask(task) {
            AppState.activeTask = task;
            if (task) {
                loadChecklist(task.id);
            }
            window.scrollTo(0, 0);
            render();
        }

        // ===== TASK DATA =====
        const TASKS = [
            {
                id: 'A', col: 1, row: 1,
                title: "Power-Saving Action Plan",
                color: "bg-gradient-to-b from-green-300 to-green-400",
                emoji: "🔌",
                expectations: "C1.1, C1.2",
                summary: "Create a tri-fold brochure identifying ways to reduce electricity waste at school.",
                intro: "You are an Investigative Journalist. Your mission is to report on the 'Power vs. Land' story of James Bay. You will create a professional 3-part brochure that looks at the history of this project and creates a plan for us to use power more wisely at school.",
                details: [
                    "Fold Your Paper: Fold a large 11x17 paper into three equal sections.",
                    "Section 1: The James Bay Story. Research the James Bay Hydroelectric Project. Explain how the project changed the actual land (the rivers and forests) AND one specific way this project impacted the Cree or Inuit communities (think about their food, their travel, or their traditions).",
                    "Section 2: The School Audit. Look around our classroom and school. Identify 3 specific ways we are currently wasting electricity every day.",
                    "Section 3: The Advocacy Plan. Create a 3-step 'Action Plan' to convince our school to use electricity more responsibly. What can we change now?"
                ],
                materials: "11x17 paper, markers, research devices (computer/tablet)",
                successCriteria: [
                    "I explained how the James Bay project changed the environment for the Cree or Inuit people",
                    "I identified 3 real ways our school wastes power",
                    "I created a clear 3-step plan to help our school save electricity",
                    "My brochure has bold headings, neat writing, and at least 2 labeled diagrams or drawings"
                ],
                layoutGuide: [
                    "FRONT PANEL: Title (e.g., The James Bay Investigation) + Your Name & Drawing",
                    "INSIDE LEFT: Section 1: The James Bay Story (Land & Indigenous Impacts)",
                    "INSIDE MIDDLE: Section 2: School Energy Audit (The 3 Energy Leaks)",
                    "INSIDE RIGHT: Section 3: My 3-Step Advocacy Plan"
                ],
                brochureTemplate: true
            },
            {
                id: 'D', col: 1, row: 2,
                title: "30-Second Energy Pitch",
                color: "bg-gradient-to-b from-green-300 to-green-400",
                emoji: "🎬",
                expectations: "E1.2",
                summary: "Record a high-energy PSA convincing classmates to save electricity.",
                intro: "You are a professional advocate! Your mission is to record a high-energy message that convinces your classmates to change their habits and save electricity.",
                details: [
                    "Focus on the 'Why' and the 'How.' Why do we need to save power? How can we do it at school?",
                    "Write a script that is exactly 30 seconds long.",
                    "Record yourself (audio or video). Use a catchy slogan to make it stick in people's minds!"
                ],
                materials: "iPad/Chromebook with camera or voice recorder, script paper, timer",
                successCriteria: [
                    "I evaluated a specific choice we can make to save power",
                    "I used a 'Call to Action' to invite others to join me",
                    "My recording is clear, energetic, and exactly 30 seconds"
                ],
                psaStarters: [
                    { section: "HOOK (Grab Attention!)", examples: ["Did you know that...", "What if I told you..."] },
                    { section: "THE PROBLEM (Why It Matters)", examples: ["Right now, we're wasting electricity by..."] },
                    { section: "THE SOLUTION (What We Can Do)", examples: ["Here's what we can do: ..."] },
                    { section: "CALL TO ACTION (Get People Moving!)", examples: ["Join me in...", "Together, we can..."] }
                ]
            },
            {
                id: 'G', col: 1, row: 3,
                title: "Future Electricity Postcard",
                color: "bg-gradient-to-b from-green-300 to-green-400",
                emoji: "📮",
                expectations: "E1.1",
                summary: "A postcard from 2075 showing a world powered by clean electricity.",
                intro: "You've traveled to the year 2075! The world is clean and healthy. Send a postcard back to us in 2026 to tell us how we fixed things.",
                details: [
                    "Front: Draw your town in the future. Show things like solar panels, green buildings, and clean air.",
                    "Back: Write a message to your 2026 self. Explain two big changes we made to stop climate change."
                ],
                materials: "4x6 blank cardstock, colored pencils or markers",
                successCriteria: [
                    "My drawing shows at least 3 ways the future uses clean energy",
                    "My message explains how our choices today saved the future",
                    "I used 'energy' words like conservation or sustainability"
                ],
                postcardTemplate: true
            },
            {
                id: 'B', col: 2, row: 1,
                title: "Electricity Source Comic",
                color: "bg-gradient-to-b from-purple-300 to-purple-400",
                emoji: "📚",
                expectations: "E2.5, E2.6",
                summary: "A 6-panel comic showing how electricity is generated and delivered.",
                intro: "Become a comic book artist! Follow electricity's journey from its source (coal, wind, solar, etc.) all the way to powering a device in someone's home. Make it exciting!",
                details: [
                    "Choose one source: Coal Power Plant, Natural Gas, Solar Panels, or Wind Turbines.",
                    "Panel 1-2: Show how this source generates electricity.",
                    "Panel 3-4: Show how the electricity travels through power lines.",
                    "Panel 5-6: Show the electricity powering a device in someone's home."
                ],
                materials: "Comic strip template, colored pencils",
                successCriteria: [
                    "My comic has all 6 panels filled in",
                    "I clearly showed HOW my source makes electricity",
                    "I showed electricity traveling through power lines",
                    "My comic tells a complete story from source to home"
                ]
            },
            {
                id: 'E', col: 2, row: 2,
                title: "The Great Electron Race",
                color: "bg-gradient-to-b from-purple-300 to-purple-400",
                emoji: "🎲",
                expectations: "E2.5, E2.6",
                summary: "Design a playable board game that uses a 'Race' analogy to show how electrons move through different materials.",
                intro: "You are a Lead Game Designer. Your goal is to create The Great Electron Race—a board game where players act as electrons trying to reach the finish line. You will build the actual board AND write a 'Pro Playbook' (instruction manual) that explains the science behind your game.",
                details: [
                    "The Track: Draw a path of 15–20 squares on your cardstock. (Tip: Use a zig-zag or 'S' shape to fit them all on the page!)",
                    "Special Effect Squares: Add 2 Static 'Jump' squares where players leap forward (based on real-life static electricity events like sparks or shocks). Add at least 2 Conductor squares (player moves forward or rolls again) and 2 Insulator squares (player is stopped or moved backward).",
                    "The 'Championship' Finish Line: To win, players must pass a Material Challenge (correctly identifying a mystery object as a conductor or insulator) to cross the finish line.",
                    "The Pro Playbook: On a separate sheet, write your instructions including: The Rules (how to move and win), Scientist's Corner (definitions for Static, Current, Conductor, and Insulator in your own words), and The Power Analogy (explain why players move forward on conductors and stop on insulators—how does this compare to a real electrical circuit?)."
                ],
                materials: "Large cardstock or poster board, markers, dice, game pieces, separate paper for Playbook",
                successCriteria: [
                    "I created a clear path of 15–20 squares that is colorful and ready to play",
                    "I included 2 'jump' squares linked to real static electricity events",
                    "I have at least 2 conductor squares and 2 insulator squares on my board",
                    "I wrote a separate Playbook that explains how to play",
                    "I defined Static, Current, Conductor, and Insulator in my own words",
                    "I explained why moving forward on conductors and backward on insulators makes sense for a circuit",
                    "My finish line requires a specific material-based challenge to win"
                ]
            },
            {
                id: 'H', col: 2, row: 3,
                title: "Static vs. Current Showdown",
                color: "bg-gradient-to-b from-purple-300 to-purple-400",
                emoji: "🔍",
                expectations: "E2.5, E2.6",
                summary: "A Venn Diagram comparing Static Electricity vs Current Electricity.",
                intro: "It's the ultimate electricity showdown! Static vs. Current—which is which? Use a Venn Diagram to put these two types of electricity head-to-head. How do they move? Where do we see them? What do they have in common?",
                details: [
                    "Draw two large overlapping circles (Venn Diagram). Label one 'Static Electricity' and one 'Current Electricity'.",
                    "Compare and contrast: How do electrons move in each? How are they used? Where do we see them in real life?",
                    "In the MIDDLE (overlapping) section: Write what they have in common.",
                    "In the OUTSIDE sections (not overlapping): Write how they are different.",
                    "Include a detailed drawing of one 'Static Trick' (like a balloon sticking to a wall, hair standing up, or a shock from a doorknob).",
                    "Explain the science behind your static trick: Why do the electrons behave that way?"
                ],
                materials: "Large poster board or construction paper, markers, colored pencils",
                successCriteria: [
                    "I listed at least 3 differences and 2 similarities between static and current electricity",
                    "I explained how electrons move in BOTH types of electricity",
                    "My diagram of a static phenomenon (trick) is clear with labels",
                    "I explained the science behind my static trick accurately"
                ],
                vennExamples: [
                    {
                        title: "Example 1: Cats vs. Dogs",
                        leftCircle: "Cats", rightCircle: "Dogs",
                        leftOnly: ["Meow", "Climb trees", "Use litter box", "Independent"],
                        both: ["Have fur", "Four legs", "Are pets", "Need food & water"],
                        rightOnly: ["Bark", "Play fetch", "Go on walks", "Very loyal"]
                    },
                    {
                        title: "Example 2: Summer vs. Winter",
                        leftCircle: "Summer", rightCircle: "Winter",
                        leftOnly: ["Hot weather", "Swimming", "No school", "Long days"],
                        both: ["Have holidays", "Time with family", "Outdoor activities", "Fun!"],
                        rightOnly: ["Cold weather", "Snow", "Skiing", "Short days"]
                    }
                ]
            },
            {
                id: 'C', col: 3, row: 1,
                title: "The Electron's Journey",
                color: "bg-gradient-to-b from-orange-300 to-orange-400",
                emoji: "⚡",
                expectations: "E2.2, E2.3",
                summary: "Write a story from an electron's perspective traveling through a circuit.",
                intro: "Imagine a tiny electron zipping through wires! Write a short story describing an electron's journey through a simple circuit. What happens when it hits the switch? What about when it reaches the lightbulb?",
                details: [
                    "Write a creative story about an electron traveling through a circuit.",
                    "Describe the journey through a simple circuit with a battery, wires, switch, and lightbulb.",
                    "Explain what happens when the switch is turned on.",
                    "Describe what happens when the electron reaches the lightbulb and transforms into light.",
                    "Your story should be at least 3 paragraphs (about 1 page), but no more than 2 pages."
                ],
                materials: "Writing paper or Google Docs, pencil or computer",
                successCriteria: [
                    "I wrote a creative story about an electron's journey",
                    "I described the journey through all parts of the circuit (battery, wires, switch, lightbulb)",
                    "I explained what happens when the switch turns on",
                    "I described the electron transforming into light at the lightbulb",
                    "My story is at least 3 paragraphs (about 1 page) but no more than 2 pages"
                ]
            },
            {
                id: 'F', col: 3, row: 2,
                title: "Circuit All-Star Trading Cards",
                color: "bg-gradient-to-b from-orange-300 to-orange-400",
                emoji: "✨",
                expectations: "E2.1, E2.3",
                summary: "Design a 4-card collector's set that explains how a circuit works and what happens when a part stops working.",
                intro: "You are designing a set of 'All-Star' trading cards for the four main parts of a circuit. Each card must be one-sided and include the artwork, the scientific symbol, and key data about that component.",
                details: [
                    "Create 4 cards: The Battery (Power Source), The Output Device (Lightbulb, Motor, or Buzzer), The Wires (The Path), and The Switch (The Gatekeeper).",
                    "For each card, include: A colored drawing of the part, the official scientific symbol used in circuit diagrams, 'The Job' (1-sentence explanation of what this part does), and 'System Failure' (what happens to the whole circuit if this part is broken or missing).",
                    "Make your cards colorful, neat, and use a consistent sports card style.",
                    "Cards should be sized like real trading cards (approximately 2.5\" x 3.5\")."
                ],
                materials: "Cardstock rectangles (2.5\" x 3.5\"), colored pencils or markers, ruler",
                successCriteria: [
                    "I have all 4 cards: Battery, Output Device, Wires, and Switch",
                    "Every card has the correct official circuit symbol drawn on it",
                    "I explained what each part does in my own words (The Job)",
                    "I explained exactly how the circuit breaks without that part (System Failure)",
                    "My cards are colorful, neat, and use a consistent sports card style"
                ],
                cardTemplates: true
            },
            {
                id: 'I', col: 3, row: 3,
                title: "Circuit Tech Support Call",
                color: "bg-gradient-to-b from-orange-300 to-orange-400",
                emoji: "🎤",
                expectations: "E2.4",
                summary: "Analyze a broken circuit diagram and record a tech support call explaining how to fix it.",
                intro: "Ring, ring! You're an Electrical Technician taking a tech support call. A customer sent you a diagram of their broken circuit—the lightbulb won't turn on! Study the circuit diagram, find ALL the problems, and record a 1-minute call walking them through how to fix it.",
                details: [
                    "Look at the circuit diagram below. There are MULTIPLE problems!",
                    "Identify ALL the problems in the circuit. Are wires disconnected? Is the switch open? Is the battery placed backwards?",
                    "Record a 1-minute 'Tech Support Call' where you walk the customer through checking all 4 circuit parts: Battery (the power source), Lightbulb (the load that uses energy), Wires (the conductors), and Switch (the control).",
                    "Explain what each part does so the customer understands how electricity flows.",
                    "Tell them step-by-step how to fix EACH problem you found.",
                    "Use the script starters below to help you organize your call!"
                ],
                materials: "Circuit diagram (below), voice recorder app, script planning sheet",
                successCriteria: [
                    "I identified all 4 circuit parts: Battery, Lightbulb, Wires, and Switch",
                    "I explained what each part does in the circuit",
                    "I found ALL the problems in the diagram and explained how to fix each one",
                    "My recording sounds professional and helpful (clear voice, organized, 1 minute)"
                ],
                scriptStarters: [
                    "Hello! Thank you for calling Electrical Tech Support. Let me help you fix your circuit.",
                    "I found [NUMBER] problems in your circuit. Here's how to fix them:",
                    "Problem 1: [Explain what's wrong and how to fix it]",
                    "Problem 2: [Explain what's wrong and how to fix it]",
                    "Great! Once you fix these problems, your lightbulb should work. Thanks for calling!"
                ],
                circuitDiagram: true
            }
        ];

        // ===== RENDER FUNCTIONS =====
        function render() {
            const app = document.getElementById('app');
            app.innerHTML = AppState.activeTask ? renderDetailPage(AppState.activeTask) : renderHub();
        }

        function renderHub() {
            const completionCount = getCompletionCount();
            const col1Tasks = TASKS.filter(t => t.col === 1).sort((a, b) => a.row - b.row);
            const col2Tasks = TASKS.filter(t => t.col === 2).sort((a, b) => a.row - b.row);
            const col3Tasks = TASKS.filter(t => t.col === 3).sort((a, b) => a.row - b.row);

            return `
                <div class="min-h-screen bg-gradient-to-br from-orange-100 via-blue-100 to-orange-50 p-4 md:p-8 font-sans relative overflow-hidden">
                    <div class="absolute inset-0 opacity-10 pointer-events-none">
                        <svg class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                            <pattern id="circuit" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
                                <circle cx="10" cy="10" r="3" fill="#FF6B4A"/>
                                <circle cx="90" cy="90" r="3" fill="#4A9FFF"/>
                                <circle cx="50" cy="50" r="3" fill="#FFB84A"/>
                                <line x1="10" y1="10" x2="50" y2="50" stroke="#4A9FFF" stroke-width="2"/>
                                <line x1="50" y1="50" x2="90" y2="90" stroke="#FF6B4A" stroke-width="2"/>
                            </pattern>
                            <rect width="100%" height="100%" fill="url(#circuit)"/>
                        </svg>
                    </div>

                    <div class="max-w-7xl mx-auto relative z-10">
                        <header class="mb-8 text-center relative">
                            <div class="flex justify-center gap-4 mb-4">
                                <div class="w-16 h-20 bg-gradient-to-b from-blue-300 to-blue-500 rounded-full relative border-4 border-blue-700">
                                    <div class="absolute -top-2 left-1/2 -translate-x-1/2 w-8 h-8 bg-yellow-200 rounded-full animate-pulse"></div>
                                </div>
                                <div class="w-16 h-20 bg-gradient-to-b from-orange-300 to-orange-500 rounded-full relative border-4 border-orange-700">
                                    <div class="absolute -top-2 left-1/2 -translate-x-1/2 w-8 h-8 bg-yellow-200 rounded-full animate-pulse"></div>
                                </div>
                            </div>

                            <div class="bg-blue-200 border-8 border-blue-900 rounded-3xl p-6 shadow-2xl inline-block">
                                <p class="text-sm md:text-base font-black text-blue-900 uppercase tracking-widest mb-2">
                                    Electricity Mission Choice Board
                                </p>
                                <div class="inline-block relative">
                                    <h1 class="text-5xl md:text-7xl font-black text-red-500 tracking-tight" style="font-family: Arial Black, sans-serif; text-shadow: 4px 4px 0px #333;">
                                        ELECTRICITY
                                    </h1>
                                    <div class="absolute -top-6 left-1/2" style="transform: translateX(-50%);">
                                        <div class="text-5xl">⚡</div>
                                    </div>
                                </div>
                            </div>

                            <p class="text-lg md:text-xl text-slate-800 max-w-3xl mx-auto font-black leading-relaxed mt-6 bg-white/80 rounded-2xl p-4 border-4 border-slate-700">
                                Pick <span class="bg-yellow-300 px-3 py-1 rounded-lg text-2xl border-2 border-yellow-600">ONE</span> mission from each color column!
                            </p>
                            
                            <div class="mt-6 inline-flex items-center gap-4 bg-gradient-to-r from-orange-300 to-yellow-300 px-8 py-5 rounded-3xl shadow-xl border-4 border-orange-700 flex-wrap justify-center">
                                <div class="text-5xl">🎯</div>
                                <div class="text-left">
                                    <p class="text-sm font-black text-orange-900 uppercase">Missions Selected</p>
                                    <p class="text-4xl font-black text-blue-900">${completionCount} / 3</p>
                                </div>
                                ${completionCount === 3 ? `
                                <div class="ml-4 bg-green-400 text-green-900 px-5 py-3 rounded-full font-black text-base border-4 border-green-700">
                                    Ready to start! 🎉
                                </div>
                                ` : ''}
                                ${completionCount > 0 ? `
                                <button onclick="handleReset()" class="ml-2 bg-red-300 hover:bg-red-400 text-red-900 px-5 py-3 rounded-full font-black text-sm transition-all border-4 border-red-700" title="Clear all your choices">
                                    🔄 Reset Missions
                                </button>
                                ` : ''}
                            </div>
                        </header>

                        <div class="mb-8 bg-gradient-to-r from-blue-200 to-cyan-200 rounded-2xl p-4 shadow-xl border-4 border-blue-900 max-w-3xl mx-auto">
                            <h3 class="font-black text-xl text-blue-900 mb-3 text-center">
                                🎮 Mission Briefing
                            </h3>
                            <div class="space-y-2">
                                <div class="flex items-start gap-2">
                                    <span class="font-black text-blue-900 text-lg shrink-0">1.</span>
                                    <p class="font-black text-slate-900 text-sm md:text-base">Click any mission card to see your objectives</p>
                                </div>
                                <div class="flex items-start gap-2">
                                    <span class="font-black text-purple-900 text-lg shrink-0">2.</span>
                                    <p class="font-black text-slate-900 text-sm md:text-base">Choose ONE mission from EACH color zone</p>
                                </div>
                                <div class="flex items-start gap-2">
                                    <span class="font-black text-orange-900 text-lg shrink-0">3.</span>
                                    <p class="font-black text-slate-900 text-sm md:text-base">Complete all 3 missions to finish your quest!</p>
                                </div>
                            </div>
                            <div class="bg-green-300 border-2 border-green-700 rounded-xl p-2 text-center mt-3">
                                <p class="text-xs font-black text-green-900">
                                    💾 Your mission selections are saved automatically!
                                </p>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-4 md:gap-6 mb-4 md:mb-6">
                            <div class="text-center">
                                <div class="bg-gradient-to-b from-green-300 to-green-400 text-green-900 py-4 md:py-5 px-2 md:px-6 rounded-3xl font-black uppercase tracking-wider text-sm md:text-lg shadow-lg border-4 border-green-700">
                                    <div class="text-4xl md:text-5xl mb-2">💡</div>
                                    <div>Mission Zone 1</div>
                                    <div class="text-xs font-bold normal-case mt-1">Impacts</div>
                                </div>
                            </div>
                            <div class="text-center">
                                <div class="bg-gradient-to-b from-purple-300 to-purple-400 text-purple-900 py-4 md:py-5 px-2 md:px-6 rounded-3xl font-black uppercase tracking-wider text-sm md:text-lg shadow-lg border-4 border-purple-700">
                                    <div class="text-4xl md:text-5xl mb-2">🔋</div>
                                    <div>Mission Zone 2</div>
                                    <div class="text-xs font-bold normal-case mt-1">Power Sources</div>
                                </div>
                            </div>
                            <div class="text-center">
                                <div class="bg-gradient-to-b from-orange-300 to-orange-400 text-orange-900 py-4 md:py-5 px-2 md:px-6 rounded-3xl font-black uppercase tracking-wider text-sm md:text-lg shadow-lg border-4 border-orange-700">
                                    <div class="text-4xl md:text-5xl mb-2">🔌</div>
                                    <div>Mission Zone 3</div>
                                    <div class="text-xs font-bold normal-case mt-1">Circuits</div>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3 md:gap-6 mb-8">
                            <div class="space-y-3 md:space-y-6">
                                ${col1Tasks.map(task => renderMissionCard(task)).join('')}
                            </div>
                            <div class="space-y-3 md:space-y-6">
                                ${col2Tasks.map(task => renderMissionCard(task)).join('')}
                            </div>
                            <div class="space-y-3 md:space-y-6">
                                ${col3Tasks.map(task => renderMissionCard(task)).join('')}
